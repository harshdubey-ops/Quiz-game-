<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Quiz</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <button type="button" id="mute-btn" class="mute-btn" aria-label="Mute sound">🔊</button>

  <main class="container">

    <section id="start-screen" class="screen active">
      <header class="screen-header">
        <p class="eyebrow">Programming Quiz</p>
        <h1>How well do you<br>know code?</h1>
        <p class="sub">Pick a difficulty to begin and answer quickly for a better score.</p>
      </header>

      <div class="difficulty-select" role="list">
        <button type="button" class="diff-btn" data-diff="easy">
          <span class="diff-label">Easy</span>
          <span class="diff-meta">20s · +10 / -5</span>
        </button>
        <button type="button" class="diff-btn" data-diff="medium">
          <span class="diff-label">Medium</span>
          <span class="diff-meta">15s · +15 / -7</span>
        </button>
        <button type="button" class="diff-btn" data-diff="hard">
          <span class="diff-label">Hard</span>
          <span class="diff-meta">10s · +20 / -10</span>
        </button>
      </div>

      <p id="high-score" class="high-score"></p>
      <p class="hint">Tip: answer quickly and accurately to maximize your performance rating.</p>
    </section>

    <section id="quiz-screen" class="screen" aria-live="polite">
      <div class="top-bar">
        <span id="difficulty-label" class="tag">Difficulty</span>
        <span id="question-count" class="tag"></span>
        <span id="timer" class="tag timer">15</span>
        <span id="score-display" class="tag">0 pts</span>
      </div>

      <div class="progress-wrapper">
        <div class="progress-label">
          <span>Progress</span>
          <span id="progress-percent">0%</span>
        </div>
        <div class="progress-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" aria-label="Quiz progress">
          <div id="progress-fill"></div>
        </div>
      </div>

      <h2 id="question-text"></h2>
      <div id="options" class="options"></div>

      <div id="explanation" class="explanation" aria-live="polite"></div>

      <div class="action-row">
        <button type="button" id="skip-btn" class="btn-ghost">Skip question</button>
        <span id="streak" class="streak"></span>
      </div>
    </section>

    <section id="end-screen" class="screen" aria-live="polite">
      <header class="screen-header">
        <p class="eyebrow">Results</p>
        <h1 id="result-heading">Quiz complete</h1>
      </header>

      <p id="final-score" class="final-score"></p>
      <p id="final-detail" class="final-detail"></p>
      <p id="performance-summary" class="performance-summary"></p>
      <p id="best-score-msg" class="high-score"></p>

      <div class="end-actions">
        <button type="button" id="restart-btn" class="btn-primary">Try again</button>
        <button type="button" id="share-btn" class="btn-ghost">Share result</button>
      </div>
    </section>

  </main>

<script src="script.js"></script>
</body>
</html>
